apiVersion: v1
kind: ConfigMap
metadata:
  name: mogbank-config
  namespace: mogbank
  labels:
    app: mogbank
data:
  # Database
  DB_HOST: "mogbank-postgres"
  DB_PORT: "5432"
  DB_NAME: "mogbank"
  DB_USER: "mogbank"

  # Redis
  REDIS_HOST: "mogbank-redis"
  REDIS_PORT: "6379"

  # Base L2 Configuration
  ETH_RPC_URL: "https://mainnet.base.org"
  ETH_CHAIN_ID: "8453"
  USDC_ADDRESS: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
  DDSC_CONTRACT: "0x0000000000000000000000000000000000000000"

  # Application defaults
  MAX_AGENTS_PER_USER: "50"
  FAUCET_DAILY_LIMIT: "500"
  FAUCET_DEFAULT_AMOUNT: "100"
  KYA_MIN_SCORE: "30"

  # x402 Protocol
  X402_ENABLED: "true"
  X402_PROTOCOL_FEE: "0.001"

  # Streaming
  STREAM_MAX_CLIENTS_PER_AGENT: "1000"

  # DDSC
  DDSC_ENABLED: "false"
  DDSC_MAX_AGENTS: "1000000"
  DDSC_DEFAULT_CDP_DEBT: "0"
  DDSC_GLOBAL_CDP_LIMIT: "100000000000"

  # Idempotency
  IDEMPOTENCY_KEY_TTL_SECONDS: "86400"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mogbank-web-config
  namespace: mogbank
  labels:
    app: mogbank
    component: web
data:
  NEXT_PUBLIC_API_URL: "https://api.mogbank.io"
  NEXT_PUBLIC_BASE_EXPLORER: "https://basescan.org"