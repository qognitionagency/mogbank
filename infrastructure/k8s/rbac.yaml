apiVersion: v1
kind: ServiceAccount
metadata:
  name: mogbank-backend
  namespace: mogbank
  labels:
    app: mogbank
    component: backend
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mogbank-web
  namespace: mogbank
  labels:
    app: mogbank
    component: web
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mogbank-backend
  namespace: mogbank
  labels:
    app: mogbank
    component: backend
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["mogbank-config", "mogbank-secrets"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mogbank-backend
  namespace: mogbank
  labels:
    app: mogbank
    component: backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mogbank-backend
subjects:
  - kind: ServiceAccount
    name: mogbank-backend
    namespace: mogbank
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mogbank-web
  namespace: mogbank
  labels:
    app: mogbank
    component: web
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["mogbank-web-config"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mogbank-web
  namespace: mogbank
  labels:
    app: mogbank
    component: web
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mogbank-web
subjects:
  - kind: ServiceAccount
    name: mogbank-web
    namespace: mogbank
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mogbank-backend
  namespace: mogbank
  labels:
    app: mogbank
spec:
  podSelector:
    matchLabels:
      component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: web
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - podSelector:
            matchLabels:
              component: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              component: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app: external-secrets
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mogbank-web
  namespace: mogbank
  labels:
    app: mogbank
spec:
  podSelector:
    matchLabels:
      component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              component: backend
      ports:
        - protocol: TCP
          port: 3001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mogbank-postgres
  namespace: mogbank
  labels:
    app: mogbank
spec:
  podSelector:
    matchLabels:
      component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: backend
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mogbank-redis
  namespace: mogbank
  labels:
    app: mogbank
spec:
  podSelector:
    matchLabels:
      component: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: backend
      ports:
        - protocol: TCP
          port: 6379