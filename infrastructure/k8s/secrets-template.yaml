apiVersion: v1
kind: Secret
metadata:
  name: mogbank-secrets
  namespace: mogbank
  labels:
    app: mogbank
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://mogbank:{{ .Values.db.password }}@mogbank-postgres:5432/mogbank"
  DB_PASSWORD: "{{ .Values.db.password }}"

  # Redis
  REDIS_URL: "redis://:{{ .Values.redis.password }}@mogbank-redis:6379"

  # Supabase
  SUPABASE_URL: "{{ .Values.supabase.url }}"
  SUPABASE_ANON_KEY: "{{ .Values.supabase.anonKey }}"
  SUPABASE_SERVICE_KEY: "{{ .Values.supabase.serviceKey }}"

  # Ed25519 signing key
  ED25519_PRIVATE_KEY: "{{ .Values.crypto.ed25519PrivateKey }}"

  # x402 Protocol
  X402_PRIVATE_KEY: "{{ .Values.crypto.x402PrivateKey }}"

  # JWT
  JWT_SECRET: "{{ .Values.auth.jwtSecret }}"

  # Blockchain
  ETHEREUM_PRIVATE_KEY: "{{ .Values.blockchain.ethereumPrivateKey }}"
  BASE_RPC_URL: "{{ .Values.blockchain.baseRpcUrl }}"

  # DDSC
  DDSC_PRIVATE_KEY: "{{ .Values.blockchain.ddscPrivateKey }}"