[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "autogen-mogbank"
version = "1.0.0"
description = "AutoGen integration for MogBank — Conversational Agent Banking"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "MogBank Team", email = "dev@mogbank.dev"}
]
keywords = ["autogen", "mogbank", "conversational-agents", "agent-banking", "usdc"]

dependencies = [
    "autogen-agentchat>=0.3.0",
    "mogbank>=1.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]