[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "crewai-mogbank"
version = "1.0.0"
description = "CrewAI integration for MogBank — Multi-Agent Banking Tools"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "MogBank Team", email = "dev@mogbank.dev"}
]
keywords = ["crewai", "mogbank", "multi-agent", "agent-banking", "usdc"]

dependencies = [
    "crewai>=0.30.0",
    "mogbank>=1.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]